name: Initialize SQL Databases

on:
  workflow_dispatch:

env:
  POSTGRES_HOST: togglemaster-db.c1wcg6yasyvp.us-east-1.rds.amazonaws.com
  POSTGRES_PORT: 5432
  POSTGRES_USER: togglemaster_admin
  POSTGRES_PASSWORD: ${{ secrets.RDS_PASSWORD }}
  POSTGRES_DB_auth: auth_db
  POSTGRES_DB_flag: flag_db
  POSTGRES_DB_targeting: targeting_db
  AWS_REGION: us-east-1
  
jobs:
  init-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Database
        run: |
          echo "Waiting for database to be ready..."
          until PGPASSWORD=$POSTGRES_PASSWORD pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
            echo "Database not ready, waiting..."
            sleep 2
          done
          echo "Database is ready!"

      - name: Create Auth Database and Tables
        run: |
          echo "Creating auth_db database..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d postgres -c "CREATE DATABASE IF NOT EXISTS auth_db;"
          
          echo "Running auth migration..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB_auth <<'SQL'
          CREATE TABLE IF NOT EXISTS api_keys (
            id SERIAL PRIMARY KEY,
            name VARCHAR(100) NOT NULL,
            key_hash VARCHAR(64) NOT NULL UNIQUE,
            is_active BOOLEAN DEFAULT true,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          SQL

      - name: Create Flag Database and Tables  
        run: |
          echo "Creating flag_db database..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d postgres -c "CREATE DATABASE IF NOT EXISTS flag_db;"
          
          echo "Running flag migration..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB_flag <<'SQL'
          CREATE TABLE IF NOT EXISTS flags (
            id SERIAL PRIMARY KEY,
            name VARCHAR(100) UNIQUE NOT NULL,
            description TEXT,
            is_enabled BOOLEAN NOT NULL DEFAULT false,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );

          CREATE OR REPLACE FUNCTION trigger_set_timestamp()
          RETURNS TRIGGER AS $$
          BEGIN
            NEW.updated_at = NOW();
            RETURN NEW;
          END;
          $$ LANGUAGE plpgsql;

          DROP TRIGGER IF EXISTS set_timestamp ON flags;

          CREATE TRIGGER set_timestamp
          BEFORE UPDATE ON flags
          FOR EACH ROW
          EXECUTE PROCEDURE trigger_set_timestamp();
          SQL

      - name: Create Targeting Database and Tables
        run: |
          echo "Creating targeting_db database..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d postgres -c "CREATE DATABASE IF NOT EXISTS targeting_db;"
          
          echo "Running targeting migration..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB_targeting <<'SQL'
          CREATE TABLE IF NOT EXISTS targeting_rules (
            id SERIAL PRIMARY KEY,
            flag_name VARCHAR(100) UNIQUE NOT NULL,
            is_enabled BOOLEAN NOT NULL DEFAULT true,
            rules JSONB NOT NULL,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );

          CREATE OR REPLACE FUNCTION trigger_set_timestamp()
          RETURNS TRIGGER AS $$
          BEGIN
            NEW.updated_at = NOW();
            RETURN NEW;
          END;
          $$ LANGUAGE plpgsql;

          DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

          CREATE TRIGGER set_timestamp
          BEFORE UPDATE ON targeting_rules
          FOR EACH ROW
          EXECUTE PROCEDURE trigger_set_timestamp();
          SQL

      - name: Verify All Tables Created
        run: |
          echo "Checking auth_db tables..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB_auth -c "\dt"
          
          echo "Checking flag_db tables..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB_flag -c "\dt"
          
          echo "Checking targeting_db tables..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB_targeting -c "\dt"