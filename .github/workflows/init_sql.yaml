name: Initialize SQL Databases

on:
  workflow_dispatch:

env:
  POSTGRES_HOST: togglemaster-db.c1wcg6yasyvp.us-east-1.rds.amazonaws.com
  POSTGRES_PORT: 5432
  POSTGRES_USER: togglemaster_admin
  POSTGRES_PASSWORD: ${{ secrets.RDS_PASSWORD }}
  POSTGRES_DB_auth: auth_db
  POSTGRES_DB_flag: flag_db
  POSTGRES_DB_targeting: targeting_db
  AWS_REGION: us-east-1
  
jobs:
  init-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Makefile
        run: |
          cat <<'EOF' > Makefile
          PSQL = PGPASSWORD=$(POSTGRES_PASSWORD) psql "host=$(POSTGRES_HOST) port=$(POSTGRES_PORT) user=$(POSTGRES_USER) dbname=$(POSTGRES_DB) sslmode=require"

          .PHONY: wait-db
          wait-db:
          	@echo "Waiting for database..."
          	@until PGPASSWORD=$(POSTGRES_PASSWORD) pg_isready -h $(POSTGRES_HOST) -p $(POSTGRES_PORT) -U $(POSTGRES_USER) -d $(POSTGRES_DB); do
          		sleep 2;
          	done

          .PHONY: auth
          auth: wait-db
          	@echo "Running auth-service init..."
          	@$(PSQL) <<'SQL'
          	CREATE TABLE IF NOT EXISTS api_keys (
          	  id SERIAL PRIMARY KEY,
          	  name VARCHAR(100) NOT NULL,
          	  key_hash VARCHAR(64) NOT NULL UNIQUE,
          	  is_active BOOLEAN DEFAULT true,
          	  created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          	);
          	SQL

          .PHONY: flag
          flag: wait-db
          	@echo "Running flag-service init..."
          	@$(PSQL) <<'SQL'
          	CREATE TABLE IF NOT EXISTS flags (
          	  id SERIAL PRIMARY KEY,
          	  name VARCHAR(100) UNIQUE NOT NULL,
          	  description TEXT,
          	  is_enabled BOOLEAN NOT NULL DEFAULT false,
          	  created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
          	  updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          	);

          	CREATE OR REPLACE FUNCTION trigger_set_timestamp()
          	RETURNS TRIGGER AS $$
          	BEGIN
          	  NEW.updated_at = NOW();
          	  RETURN NEW;
          	END;
          	$$ LANGUAGE plpgsql;

          	DROP TRIGGER IF EXISTS set_timestamp ON flags;

          	CREATE TRIGGER set_timestamp
          	BEFORE UPDATE ON flags
          	FOR EACH ROW
          	EXECUTE PROCEDURE trigger_set_timestamp();
          	SQL

          .PHONY: targeting
          targeting: wait-db
          	@echo "Running targeting-service init..."
          	@$(PSQL) <<'SQL'
          	CREATE TABLE IF NOT EXISTS targeting_rules (
          	  id SERIAL PRIMARY KEY,
          	  flag_name VARCHAR(100) UNIQUE NOT NULL,
          	  is_enabled BOOLEAN NOT NULL DEFAULT true,
          	  rules JSONB NOT NULL,
          	  created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
          	  updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          	);

          	CREATE OR REPLACE FUNCTION trigger_set_timestamp()
          	RETURNS TRIGGER AS $$
          	BEGIN
          	  NEW.updated_at = NOW();
          	  RETURN NEW;
          	END;
          	$$ LANGUAGE plpgsql;

          	DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

          	CREATE TRIGGER set_timestamp
          	BEFORE UPDATE ON targeting_rules
          	FOR EACH ROW
          	EXECUTE PROCEDURE trigger_set_timestamp();
          	SQL

          .PHONY: all
          all: auth flag targeting
          	@echo "All migrations executed"

          .PHONY: tables
          tables:
          	@$(PSQL) -c "\dt"
          EOF

      - name: Run Auth Database Migration
        run: |
          export POSTGRES_DB=$POSTGRES_DB_auth
          make auth

      - name: Run Flag Database Migration  
        run: |
          export POSTGRES_DB=$POSTGRES_DB_flag
          make flag

      - name: Run Targeting Database Migration
        run: |
          export POSTGRES_DB=$POSTGRES_DB_targeting
          make targeting