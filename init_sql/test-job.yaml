apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-init
  namespace: auth-service
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: psql
        image: postgres:15
        env:
        - name: PGPASSWORD
          value: "testedbteste"
        command: ["psql"]
        args:
        - "-h"
        - "togglemaster-db.c1wcg6yasyvp.us-east-1.rds.amazonaws.com"
        - "-p"
        - "5432"
        - "-U"
        - "togglemaster_admin"
        - "-d"
        - "auth_db"
        - "-c"
        - "CREATE TABLE IF NOT EXISTS api_keys (id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL, key_hash VARCHAR(64) NOT NULL UNIQUE, is_active BOOLEAN DEFAULT true, created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP); SELECT 'Migration completed!';"

---

